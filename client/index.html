    <style>
      body {
        background-color: #ffffff; /* Fallback to prevent black flash */
        margin: 0;
      }
      #mine-preloader {
        display: flex;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background-color: #ffffff;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        z-index: 99999;
      }
      .preloader-line {
        width: 140px;
        height: 1px;
        background: #f0f0f0;
        position: relative;
        overflow: hidden;
      }
      .preloader-line::after {
        content: '';
        position: absolute;
        width: 40px;
        height: 100%;
        background: #000;
        left: -40px;
        animation: scanLine 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      @keyframes scanLine {
        0% { left: -40px; }
        100% { left: 140px; }
      }
      .preloader-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #000;
        opacity: 0;
        animation: textFade 1s 0.2s forwards;
      }
      @keyframes textFade {
        to { opacity: 0.3; }
      }
    </style>
    <!-- Preloader stays outside React's hydration path to prevent intermediate destruction flashes -->
    <div id="mine-preloader">
      <div class="preloader-line"></div>
      <div class="preloader-text">ROHIT JANGRA</div>
    </div>
    <div id="root"></div>
